<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordPop - 设置</title>
  <link rel="stylesheet" href="../shared/common.css">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-container">
    <!-- 标题栏 -->
    <div class="settings-header">
      <h1>⚙ 设置</h1>
      <span class="settings-subtitle">配置你的学习偏好</span>
    </div>

    <!-- 设置内容 -->
    <div class="settings-content">
      <!-- 每日新词数 -->
      <div class="form-group">
        <label class="form-label">📅 每日新词数量</label>
        <div class="daily-new-words-wrapper">
          <select class="form-select" id="dailyNewWords">
            <option value="5">5 个（轻松模式）</option>
            <option value="10">10 个</option>
            <option value="20" selected>20 个（推荐）</option>
            <option value="30">30 个</option>
            <option value="50">50 个（冲刺模式）</option>
            <option value="custom">自定义</option>
          </select>
          <input type="number" class="form-input custom-daily-input" id="customDailyNewWords"
                 min="1" max="200" style="display:none" placeholder="每日词量">
        </div>
        <span class="form-hint">每天新学的单词数量，复习单词不在此限制内</span>
      </div>

      <!-- 预测卡片 -->
      <div class="form-group prediction-card" id="prediction-card">
        <div class="prediction-empty" id="prediction-empty">请先选择词库</div>
        <div class="prediction-content" id="prediction-content" style="display:none">
          <!-- 进度摘要条 -->
          <div class="progress-summary">
            <div class="progress-bar-wrapper">
              <div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%"></div>
            </div>
            <div class="progress-percent" id="progress-percent">0%</div>
          </div>
          <div class="progress-stats">
            <span id="stat-total">总计 -- 个</span>
            <span id="stat-learned">已学 -- 个</span>
            <span id="stat-mastered">已掌握 -- 个</span>
            <span id="stat-remaining">剩余 -- 个</span>
          </div>

          <!-- 预测天数 -->
          <div class="prediction-row">
            <span class="prediction-label">预计完成</span>
            <span class="prediction-value" id="predicted-days">-- 天</span>
            <span class="prediction-detail" id="predicted-date"></span>
          </div>

          <!-- 目标日期 -->
          <div class="target-date-row">
            <label class="form-label">🎯 目标完成日期</label>
            <div class="target-date-input-wrapper">
              <input type="date" class="form-input" id="targetDate">
              <button class="btn btn-sm btn-ghost" id="btn-clear-target">清除</button>
            </div>
            <div class="target-result" id="target-result"></div>
          </div>
        </div>
      </div>

      <!-- 弹窗位置 -->
      <div class="form-group">
        <label class="form-label">📍 弹窗位置</label>
        <div class="position-selector" id="position-selector">
          <div class="position-option" data-pos="top-left">左上</div>
          <div class="position-option" data-pos="top-right">右上</div>
          <div class="position-option" data-pos="bottom-left">左下</div>
          <div class="position-option active" data-pos="bottom-right">右下</div>
        </div>
      </div>

      <!-- 词库选择 -->
      <div class="form-group">
        <label class="form-label">📚 学习词库</label>
        <div class="wordlist-options" id="wordlist-options">
          <!-- 动态填充 -->
        </div>
        <div class="wordlist-actions">
          <button class="btn btn-sm btn-ghost" id="btn-import-custom">📂 导入自定义词表</button>
        </div>
      </div>

      <!-- 显示选项 -->
      <div class="form-group">
        <label class="form-label">👁 显示选项</label>
        <div class="toggle-row">
          <span>显示例句</span>
          <label class="toggle">
            <input type="checkbox" id="showExample" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span>自动发音</span>
          <label class="toggle">
            <input type="checkbox" id="autoPronounce">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- 字体大小 -->
      <div class="form-group">
        <label class="form-label">🔤 字体大小</label>
        <select class="form-select" id="fontSize">
          <option value="small">小</option>
          <option value="medium" selected>中</option>
          <option value="large">大</option>
        </select>
      </div>

      <!-- 开机自启 -->
      <div class="form-group">
        <div class="toggle-row">
          <span>🚀 开机自动启动</span>
          <label class="toggle">
            <input type="checkbox" id="autoStart">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <!-- 调试选项 -->
      <div class="form-group">
        <label class="form-label">🐛 调试</label>
        <div class="toggle-row">
          <button class="btn btn-sm btn-ghost" id="btn-logs">📄 查看日志</button>
        </div>
      </div>
    </div>

    <!-- 底部按钮 -->
    <div class="settings-footer">
      <button class="btn btn-ghost" id="btn-cancel">取消</button>
      <button class="btn btn-primary" id="btn-save">💾 保存设置</button>
    </div>
  </div>

  <script src="../shared/utils.js"></script>
  <script src="settings.js"></script>
</body>
</html>
